<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Timer</title>
<style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 0 auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* ── Timer display ── */
    #displayTitle {
        font-size: clamp(18px, 5vw, 28px);
        font-weight: bold;
        text-align: center;
        margin-top: 10px;
        min-height: 1.4em;
    }

    #display {
        width: 100%;
        font-size: clamp(48px, 14vw, 96px);
        text-align: center;
        padding: clamp(12px, 4vw, 24px) 20px;
        margin-top: 6px;
        color: #000;
        background: #f0f0f0;
        cursor: pointer;
        user-select: none;
        border-radius: 8px;
    }

    #progressContainer {
        width: 100%;
        height: clamp(10px, 2vw, 20px);
        background: #ddd;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 8px;
    }

    #progressBar {
        height: 100%;
        width: 0%;
        background: rgba(0,0,0,0.3);
        transition: width 0.3s linear;
    }

    /* ── Config section ── */
    #configSection {
        margin-top: 20px;
        padding-bottom: 40px;
    }

    /* ── Timer blocks ── */
    .timer {
        border: 1px solid #ccc;
        padding: 12px;
        margin-bottom: 16px;
        border-radius: 6px;
    }

    label {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin: 6px 0;
        font-size: 16px;
    }

    input[type="text"],
    input[type="number"],
    select {
        font-size: 16px;   /* 16px prevents iOS zoom-on-focus */
        padding: 8px 10px;
        border: 1px solid #bbb;
        border-radius: 4px;
    }

    button {
        font-size: 16px;
        padding: 8px 14px;
        min-height: 44px;  /* comfortable touch target */
        cursor: pointer;
    }

    h2 { font-size: 20px; margin: 12px 0 8px; padding: 10px 0; border-top:1px solid #ccc;}
    h4 { font-size: 16px; margin: 10px 0 4px; }

    /* ── Preset bar ── */
    #configSection > div:first-child,
    body > div:has(button[onclick="savePreset()"]) {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
    }

    /* ── Mobile tweaks ── */
    @media (max-width: 600px) {
        body { padding: 12px; }
        select { width: 60% !important; max-width: 100% !important; }
        
    }
</style>
</head>
<body>

<div id="displayTitle"></div>
<div id="display">00:00</div>
<div id="progressContainer">
    <div id="progressBar"></div>
</div>

<h2>Timer Presets<button style="float:right;" onclick="loadDefaultPreset('Enbu')">Load Enbu</button></h2>
<div id="presetSection">    
    <button onclick="savePreset()">Save Preset</button>
    <select id="presetSelect"></select>
    <button onclick="loadPreset()">Load Preset</button>
    <button onclick="deletePreset()">Delete Preset</button>
    <button onclick="exportPreset()">Export Preset</button>
    <button onclick="importPreset()">Import Preset</button>
</div>

<div id="configSection">
    <h2>Timers</h2>
    <div id="timers"></div>
    <button onclick="addTimer()">Add Timer</button>
</div>

<footer style="margin-top:40px;padding:20px; text-align:center;font-size:14px;color:#555;border-top:1px solid #ccc;">
    <div>Created by <strong>Shmightworks</strong></div>

    <div style="margin-top:6px;">
        <a href="https://github.com/shmightworks/MultiTimer" target="_blank">
            GitHub
        </a>
    </div>

    <div style="margin-top:6px;">
        <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="shmightworks" data-color="#FFDD00" data-emoji=""  data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff" ></script>
    </div>

    <div style="margin-top:6px; font-size:12px; opacity:0.7;">
        © <span id="year"></span> All rights reserved.
    </div>
</footer>

<script>
/* ---------------------------------------------------------
   GLOBALS
--------------------------------------------------------- */
let voices = [];
let timersConfig = [];
let currentIndex = -1;
let intervalId = null;
let isRunning = false;
let remaining = 0;
let total = 0;
let clickTimeout = null;

/* ---------------------------------------------------------
   VOICE LOADING
--------------------------------------------------------- */
function loadVoices() {
    voices = speechSynthesis.getVoices();
    document.querySelectorAll('.voiceSelect').forEach(sel => {
        const selected = sel.getAttribute('data-selected') || '';
        populateVoiceSelect(sel, selected);
    });
}
speechSynthesis.onvoiceschanged = loadVoices;
window.addEventListener('load', () => {
    loadVoices();
    loadPresetDropdown();
});

/* ---------------------------------------------------------
   POPULATE VOICE DROPDOWN
--------------------------------------------------------- */
function populateVoiceSelect(select, selectedName) {
    select.innerHTML = '';
    const optDefault = document.createElement('option');
    optDefault.value = '';
    optDefault.textContent = 'Default voice';
    select.appendChild(optDefault);

    voices.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = `${v.name} (${v.lang})`;
        if (v.name === selectedName) opt.selected = true;
        select.appendChild(opt);
    });
}

/* ---------------------------------------------------------
   TTS SPEAK
--------------------------------------------------------- */
function speak(text, voiceName, rate, pitch) {
    if (!text) return;

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = parseFloat(rate); 
    utterance.pitch = parseFloat(pitch);
    utterance.volume = 1;     
	if (voiceName) {
        const v = voices.find(x => x.name === voiceName);
        if (v) {
			utterance.voice = v;
			utterance.lang = v.lang;
		}
    }
	
    speechSynthesis.speak(utterance);
}

/* ---------------------------------------------------------
   ADD TIMER UI
--------------------------------------------------------- */
function addTimer(config) {
    const div = document.createElement('fieldset');
    div.className = 'timer';

    div.innerHTML = `
        <legend>Timer</legend>
        <label>
            <input type="color" class="tColor" style="width:50px;height:50px" value="${config?.color ?? '#ffffff'}">
            <input type="text" class="tTitle" style="width:70%" placeholder="Timer" value="${config?.title ?? ''}"> for 
            <input type="number" class="tTime" style="width:70px" value="${config?.time ?? 60}"> seconds
        </label>

        <h4>Voice</h4>
        <table style="width:100%">
            <tr>
                <th align="center" valign="middle" style="width:33%" rowspan="2"><select style="width:200px" class="voiceSelect" data-selected="${config?.voice ?? ''}"></select></th>
                <th style="width:33%">Speed</th>
                <th style="width:33%">Pitch</th>
            </tr>
            <tr>
                <td align="center"><input type="range" class="rateSlider" min="0.1" max="2" step="0.1" value="${config?.voicerate ?? '1'}" /></td>
                <td align="center"><input type="range" class="pitchSlider" min="0" max="2" step="0.1" value="${config?.voicepitch ?? '1'}" /></td>
            </tr>
        </table>
		<h4>Prompt</h4>
        <label>Start:
            <input type="text" style="width:50%" class="tStartText" placeholder="Start" value="${config?.startText ?? ''}">
            <button class="playStart">▶</button>
        </label>

        <label>End:
            <input type="text" style="width:50%" class="tEndText" placeholder="Finish" value="${config?.endText ?? ''}">
            <button class="playEnd">▶</button>
        </label>

        <h4>Minute Reminder</h4>
        <label>
            <input type="checkbox" style="width:20px" class="tAnnounce" ${config?.announce ? 'checked' : ''}>
            <input type="text" style="width:50%" class="tAnnounceText" value="${config?.announceText ?? 'minutes remaining'}">
            <button class="playAnnounce">▶</button>
        </label>

        <div style="margin-top:10px;">
            <button class="moveUp">▲ Move Up</button>
            <button class="moveDown">▼ Move Down</button>
            <button class="removeTimer">Remove</button>
        </div>
    `;

    document.getElementById('timers').appendChild(div);
    
	const savedVoiceName = config?.voice ?? "";
    let finalVoiceName = "";

    if (savedVoiceName) {
        // 1) Try exact match
        const exact = voices.find(v => v.name === savedVoiceName);
        if (exact) {
            finalVoiceName = exact.name;
        } else {
			const savedVoiceNameWithLang = config?.voiceWithLang ?? "";
            // 2) Fallback: derive lang from savedVoiceName string, then match voices by lang
            const lang = extractLangFromSavedName(savedVoiceNameWithLang);
            if (lang) {
                let sameLang = voices.find(v => v.lang.replace('-','').replace('_','') === lang.replace('-','').replace('_',''));
                if (sameLang) {
                    finalVoiceName = sameLang.name;
                }
            }
        }
    }

    const voiceSelect = div.querySelector('.voiceSelect');
    populateVoiceSelect(voiceSelect, finalVoiceName);

    div.querySelector('.playStart').onclick = () => {
        const txt = div.querySelector('.tStartText').value;
        const voice = div.querySelector('.voiceSelect').value;
        const rate = div.querySelector('.rateSlider').value;
        const pitch = div.querySelector('.pitchSlider').value;
        speak(txt, voice, rate, pitch);
    };

    div.querySelector('.playEnd').onclick = () => {
        const txt = div.querySelector('.tEndText').value;
        const voice = div.querySelector('.voiceSelect').value;
        const rate = div.querySelector('.rateSlider').value;
        const pitch = div.querySelector('.pitchSlider').value;
        speak(txt, voice, rate, pitch);
    };

    div.querySelector('.playAnnounce').onclick = () => {
        const txt = div.querySelector('.tAnnounceText').value;
        const voice = div.querySelector('.voiceSelect').value;
        const rate = div.querySelector('.rateSlider').value;
        const pitch = div.querySelector('.pitchSlider').value;
        speak(`1 ${txt}`, voice, rate, pitch);
    };
    
    // Remove timer
    div.querySelector('.removeTimer').onclick = () => {
        div.remove();
    };

    // Move timer up
    div.querySelector('.moveUp').onclick = () => {
        const parent = div.parentElement;
        const prev = div.previousElementSibling;
        if (prev) parent.insertBefore(div, prev);
    };

    // Move timer down
    div.querySelector('.moveDown').onclick = () => {
        const parent = div.parentElement;
        const next = div.nextElementSibling;
        if (next) parent.insertBefore(next, div);
    };
}

function extractLangFromSavedName(savedVoiceName) {
    if (!savedVoiceName) return null;
    // Look for patterns like en-US, fr-CA, ja-JP, etc.
    const match = savedVoiceName.match(/[a-z]{2,3}[-_][A-Za-z]{2}/);
    return match ? match[0] : null;
}

/* ---------------------------------------------------------
   COLLECT TIMERS FOR RUNTIME
--------------------------------------------------------- */
function collectTimersFromDOM() {
    const list = [];
    document.querySelectorAll('.timer').forEach(t => {
        list.push({
            title: t.querySelector('.tTitle').value,
            time: parseInt(t.querySelector('.tTime').value),
            color: t.querySelector('.tColor').value,

            startText: t.querySelector('.tStartText').value,
            endText: t.querySelector('.tEndText').value,

            announce: t.querySelector('.tAnnounce').checked,
            announceText: t.querySelector('.tAnnounceText').value,
            voice: t.querySelector('.voiceSelect').value,
			voiceWithLang: t.querySelector('.voiceSelect').selectedOptions[0].text,
            voicerate:t.querySelector('.rateSlider').value,
            voicepitch:t.querySelector('.pitchSlider').value
        });
    });
    return list;
}

/* ---------------------------------------------------------
   COLLECT TIMERS FOR PRESET SAVE
--------------------------------------------------------- */
function collectTimersForSave() {
    const list = [];
    document.querySelectorAll('.timer').forEach(t => {
        list.push({
            title: t.querySelector('.tTitle').value,
            time: parseInt(t.querySelector('.tTime').value),
            color: t.querySelector('.tColor').value,

            startText: t.querySelector('.tStartText').value,
            endText: t.querySelector('.tEndText').value,

            announce: t.querySelector('.tAnnounce').checked,
            announceText: t.querySelector('.tAnnounceText').value,
            voice: t.querySelector('.voiceSelect').value,
			voiceWithLang: t.querySelector('.voiceSelect').selectedOptions[0].text,
            voicerate:t.querySelector('.rateSlider').value,
            voicepitch:t.querySelector('.pitchSlider').value
        });
    });
    return list;
}

/* ---------------------------------------------------------
   DISPLAY + PROGRESS
--------------------------------------------------------- */
function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateDisplay() {
    document.getElementById('display').textContent = formatTime(remaining);
    const pct = total > 0 ? ((total - remaining) / total) * 100 : 0;
    document.getElementById('progressBar').style.width = pct + '%';
}

function applyTimerVisual(timer) {
    document.getElementById('display').style.background = timer.color;
    document.getElementById('displayTitle').textContent = timer.title;
}

/* ---------------------------------------------------------
   PROMPTS
--------------------------------------------------------- */
function playPrompt(timer, type) {
    const text = type === 'start' ? timer.startText : timer.endText;
    speak(text, timer.voice, timer.voicerate, timer.voicepitch);
}

/* ---------------------------------------------------------
   TIMER ENGINE
--------------------------------------------------------- */
function startTimer(index) {
    if (index >= timersConfig.length) {
        stopAll();
        return;
    }

    currentIndex = index;
    const timer = timersConfig[index];

    total = timer.time;
    remaining = timer.time;

    applyTimerVisual(timer);
    playPrompt(timer, 'start');
    updateDisplay();

    clearInterval(intervalId);
    intervalId = setInterval(() => {
        remaining--;
        if (remaining < 0) remaining = 0;
        updateDisplay();

        if (timer.announce && remaining > 0 && remaining % 60 === 0) {
            speak(`${remaining / 60} ${timer.announceText}`, timer.voice, timer.voicerate, timer.voicepitch);
        }

        if (remaining <= 0) {
            clearInterval(intervalId);
            playPrompt(timer, 'end');
            startTimer(index + 1);
        }
    }, 1000);

    isRunning = true;
}

function stopAll() {
    clearInterval(intervalId);
    intervalId = null;
    isRunning = false;
    currentIndex = -1;
    remaining = 0;
    total = 0;
    document.getElementById('displayTitle').textContent = '';
    updateDisplay();
}

function pauseTimers() {
    clearInterval(intervalId);
    intervalId = null;
    isRunning = false;
}

function resumeTimers() {
    if (currentIndex < 0) return startSequence(true);

    const timer = timersConfig[currentIndex];
    clearInterval(intervalId);

    intervalId = setInterval(() => {
        remaining--;
        if (remaining < 0) remaining = 0;
        updateDisplay();

        if (timer.announce && remaining > 0 && remaining % 60 === 0) {
            speak(`${remaining / 60} ${timer.announceText}`, timer.voice, timer.voicerate, timer.voicepitch);
        }

        if (remaining <= 0) {
            clearInterval(intervalId);
            playPrompt(timer, 'end');
            startTimer(currentIndex + 1);
        }
    }, 1000);

    isRunning = true;
}

function startSequence(fromBeginning) {
    speechSynthesis.cancel();

    if (fromBeginning) {
        timersConfig = collectTimersFromDOM();
        if (!timersConfig.length) return;
        startTimer(0);
    } else {
        resumeTimers();
    }
}

/* ---------------------------------------------------------
   DISPLAY CLICK / DOUBLE-CLICK
--------------------------------------------------------- */
const displayEl = document.getElementById('display');
displayEl.title = "Press to start/pause, double press to reset";
displayEl.addEventListener('click', () => {
    if (clickTimeout) return;
    clickTimeout = setTimeout(async () => {
        clickTimeout = null;
        if (!isRunning && currentIndex === -1) {
            startSequence(true);
            await requestWakeLock();
            return;
        }
        if (isRunning) {
            pauseTimers();
            wakeLock.release();
            wakeLock = null;
        }
        else { 
            resumeTimers();
            await requestWakeLock();
        }
    }, 250);
});

displayEl.addEventListener('dblclick', () => {
    if (clickTimeout) {
        clearTimeout(clickTimeout);
        clickTimeout = null;
    }
    if (confirm('Reset timers to the beginning?')) {
        resetAll();
    }
});

function resetAll() {
    wakeLock.release();
    wakeLock = null;
    stopAll();
    timersConfig = collectTimersFromDOM();
    updateDisplay();
    document.getElementById('display').style.background = '#fff';
    document.getElementById('displayTitle').textContent = '';
}

/* ---------------------------------------------------------
   PRESETS
--------------------------------------------------------- */
function savePreset() {
    const name = prompt("Enter preset name:");
    if (!name) return;

    const configs = collectTimersForSave();
    const all = JSON.parse(localStorage.getItem('timerPresets') || '{}');
    all[name] = configs;

    localStorage.setItem('timerPresets', JSON.stringify(all));
    loadPresetDropdown();
    alert("Preset saved.");
}

function loadPresetDropdown() {
    const select = document.getElementById('presetSelect');
    select.innerHTML = '';

    const all = JSON.parse(localStorage.getItem('timerPresets') || '{}');
    Object.keys(all).forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
    });
}

function loadPreset() {
    const name = document.getElementById('presetSelect').value;
    if (!name) return;

    const all = JSON.parse(localStorage.getItem('timerPresets') || '{}');
    const preset = all[name];
    if (!preset) return;

    stopAll();
    document.getElementById('timers').innerHTML = '';
    preset.forEach(cfg => addTimer(cfg));
    loadVoices();
}

function deletePreset() {
    const name = document.getElementById('presetSelect').value;
    if (!name) return;

    const all = JSON.parse(localStorage.getItem('timerPresets') || '{}');
    delete all[name];
    localStorage.setItem('timerPresets', JSON.stringify(all));
    loadPresetDropdown();
    alert("Preset deleted.");
}

function exportPreset() {
    const name = document.getElementById('presetSelect').value;
    if (!name) {
        alert("Select a preset to export.");
        return;
    }
    const all = JSON.parse(localStorage.getItem('timerPresets') || '{}');
    const preset = all[name];
    if (!preset) {
        alert("Preset not found.");
        return;
    }
    const json = JSON.stringify(preset);
    prompt("Copy this preset JSON:", json);
}

function importPreset() {
    const json = prompt("Paste preset JSON:");
    if (!json) return;
    let preset;
    try {
        preset = JSON.parse(json);
        if (!Array.isArray(preset)) throw new Error();
    } catch {
        alert("Invalid JSON.");
        return;
    }
    const name = prompt("Enter name for imported preset:");
    if (!name) return;

    const all = JSON.parse(localStorage.getItem('timerPresets') || '{}');
    all[name] = preset;
    localStorage.setItem('timerPresets', JSON.stringify(all));
    loadPresetDropdown();
    alert("Preset imported.");
}

function loadDefaultPreset(name){
    let json = "";
    switch (name)
    {
        case "Enbu":
            json = `[{"title":"Preparation","time":10,"color":"#ffffff","startText":"","endText":"","announce":false,"announceText":"minutes remaining","voice":"","voiceWithLang":"Default voice","voicerate":"1","voicepitch":"1"},{"title":"Walk In","time":5,"color":"#b8b8b8","startText":"入場","endText":"始め","announce":false,"announceText":"minutes remaining","voice":"Google 日本語","voiceWithLang":"Google 日本語 (ja-JP)","voicerate":"1","voicepitch":"1"},{"title":"Opening Reiho","time":60,"color":"#a3e8ff","startText":"","endText":"","announce":false,"announceText":"minutes remaining","voice":"Google UK English Female","voiceWithLang":"Google UK English Female (en-GB)","voicerate":"1","voicepitch":"1"},{"title":"Enbu","time":240,"color":"#a3ffa5","startText":"","endText":"","announce":false,"announceText":"minutes remaining","voice":"Google 日本語","voiceWithLang":"Google 日本語 (ja-JP)","voicerate":"1","voicepitch":"1"},{"title":"Closing Reiho","time":60,"color":"#b0b0b0","startText":"","endText":"","announce":false,"announceText":"minutes remaining","voice":"Google 日本語","voiceWithLang":"Google 日本語 (ja-JP)","voicerate":"1","voicepitch":"1"},{"title":"","time":5,"color":"#ff0000","startText":"退場","endText":"","announce":false,"announceText":"minutes remaining","voice":"Google 日本語","voiceWithLang":"Google 日本語 (ja-JP)","voicerate":"1","voicepitch":"1"}]`;
            break;
    }
    let preset;
    try {
        preset = JSON.parse(json);
        if (!Array.isArray(preset)) throw new Error();
    } catch {
        alert("Invalid JSON.");
        return;
    }
    const all = JSON.parse(localStorage.getItem('timerPresets') || '{}');
    all[name] = preset;
    localStorage.setItem('timerPresets', JSON.stringify(all));
    loadPresetDropdown();
    
    stopAll();
    document.getElementById('timers').innerHTML = '';
    preset.forEach(cfg => addTimer(cfg));
}

// The wake lock sentinel.
let wakeLock = null;

// Function that attempts to request a screen wake lock.
const requestWakeLock = async () => {
  try {
    wakeLock = await navigator.wakeLock.request();
    wakeLock.addEventListener('release', () => {
      console.log('Screen Wake Lock released:', wakeLock.released);
    });
    console.log('Screen Wake Lock released:', wakeLock.released);
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
};

/* ---------------------------------------------------------
   INITIAL
--------------------------------------------------------- */
addTimer();
updateDisplay();
document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body>
</html>
